# Contracts CI — RAT v3 (Phase 0).
#
# Validates the contract triple + regenerates/verifies the per-language SDKs
# (ADR-006). On push to the main branch it ALSO regenerates the SDKs and commits
# them back, so contracts/sdks/<lang>/ is never stale relative to contracts/proto.
#
# Unlike local dev (podman + container-only), CI installs the toolchains directly
# on the runner — that's the runner's job and keeps the jobs fast.
name: contracts

on:
  push:
    paths:
      - 'contracts/**'
      - '.github/workflows/contracts.yml'
      - 'Makefile'
      - 'scripts/gen-sdks.sh'
  pull_request:
    paths:
      - 'contracts/**'
      - '.github/workflows/contracts.yml'
      - 'Makefile'
      - 'scripts/gen-sdks.sh'

permissions:
  contents: write   # the autogen job commits regenerated SDKs back on push to main

jobs:
  # ---- Fast gate: lint + build (runs on every push and PR) -------------------
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: buf lint
        run: buf lint
        working-directory: contracts
      - name: buf build
        run: buf build
        working-directory: contracts
      - name: buf breaking (vs main)
        if: github.event_name == 'pull_request'
        run: buf breaking --against "https://github.com/${{ github.repository }}.git#branch=${{ github.base_ref }},subdir=contracts"
        working-directory: contracts

  # ---- SDK freshness (ADR-018: the pinned local codegen IS the canonical regen) ----
  # The job that used to live here regenerated FOUR languages via remote buf plugins
  # and auto-committed to main from CI — it predated ADR-018 (pinned connectionless
  # codegen), ADR-037 (Go + Python only), and the sealed-main discipline. CI now runs
  # the exact gate a contributor runs (`scripts/gen-sdks.sh --check`, which builds the
  # pinned codegen images via the runner's docker) and NEVER commits (ADR-051).
  sdks:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: SDK freshness gate (pinned local codegen)
        run: ./scripts/gen-sdks.sh --check
      - name: Compile Go SDK
        env:
          GOFLAGS: -mod=mod
          GOSUMDB: off
        run: |
          cd contracts/sdks/go
          go build ./...
