# Contracts CI — RAT v3 (Phase 0).
#
# Validates the contract triple + regenerates/verifies the per-language SDKs
# (ADR-006). On push to the main branch it ALSO regenerates the SDKs and commits
# them back, so contracts/sdks/<lang>/ is never stale relative to contracts/proto.
#
# Unlike local dev (podman + container-only), CI installs the toolchains directly
# on the runner — that's the runner's job and keeps the jobs fast.
name: contracts

on:
  push:
    paths:
      - 'contracts/**'
      - '.github/workflows/contracts.yml'
      - 'Makefile'
      - 'scripts/gen-sdks.sh'
  pull_request:
    paths:
      - 'contracts/**'
      - '.github/workflows/contracts.yml'
      - 'Makefile'
      - 'scripts/gen-sdks.sh'

permissions:
  contents: write   # the autogen job commits regenerated SDKs back on push to main

jobs:
  # ---- Fast gate: lint + build (runs on every push and PR) -------------------
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: buf lint
        run: buf lint
        working-directory: contracts
      - name: buf build
        run: buf build
        working-directory: contracts
      - name: buf breaking (vs main)
        if: github.event_name == 'pull_request'
        run: buf breaking --against "https://github.com/${{ github.repository }}.git#branch=${{ github.base_ref }},subdir=contracts"
        working-directory: contracts

  # ---- SDK freshness + compile (PRs: verify only; main push: regen + commit) --
  sdks:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Regenerate all SDKs (Go, Python, TypeScript, Rust)
        working-directory: contracts
        run: |
          for lang in go python typescript rust; do
            echo ">> buf generate --template buf.gen.$lang.yaml"
            buf generate --template "buf.gen.$lang.yaml"
          done

      - name: Compile Go SDK
        run: |
          cd contracts/sdks/go
          go build ./...

      # On PRs / non-main pushes: fail if the committed SDK is stale (author must
      # run `make gen-sdks` and commit). This is the freshness gate.
      - name: Fail if committed SDK is stale
        if: github.ref != 'refs/heads/main'
        run: |
          if ! git diff --quiet -- contracts/sdks; then
            echo "::error::contracts/sdks is stale — run 'make gen-sdks' and commit."
            git --no-pager diff --stat -- contracts/sdks
            exit 1
          fi
          echo "OK: committed SDKs are up to date."

      # On push to main: auto-commit the regenerated SDKs (the "autogenerate on
      # GitHub" requirement). No-op if nothing changed.
      - name: Commit regenerated SDKs (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          if git diff --quiet -- contracts/sdks; then
            echo "SDKs already up to date; nothing to commit."
            exit 0
          fi
          git config user.name  "rat-contracts-bot"
          git config user.email "rat-contracts-bot@users.noreply.github.com"
          git add contracts/sdks
          git commit -m "chore(sdks): regenerate from contracts/proto [skip ci]"
          git push
