// Engine axis service contract. DRAFT — sub-phase 0b.
//
// A `kind: engine` plugin (DuckDB, ClickHouse, Spark, Trino, BigQuery) turns
// SQL into Arrow. It is the compute axis: the strategy/runtime hand it SQL +
// table refs; it executes and returns an Arrow stream descriptor.
//
// Capability mapping (machine-readable via (rat.common.v1.capability) — #5):
//   rat://engine/v1/execute -> Execute (run a statement, no rows expected back)
//   rat://engine/v1/query   -> Query   (SELECT -> Arrow stream)
//   rat://engine/v1/preview -> Preview (bounded sample, for UI/inspection)
//
// NOTE (reviews/06 I-3 "split engine.Execute"): engine needs NO per-mode split —
// unlike format.Write (which was one RPC keyed by a WriteMode enum), engine's
// three methods are ALREADY distinct RPCs mapping 1:1 to three capabilities. The
// fix engine needed was the machine-readable capability binding (below), not a
// split. Recorded so the deviation from the blocker's wording is explicit.
//
// C6: each capability has a golden-data conformance vector (the engine ↔ format
// handoff is where "fits != works" bites hardest — reviews/00 Theme 4).
syntax = "proto3";

package rat.engine.v1;

import "rat/common/v1/annotations.proto";
import "rat/common/v1/data.proto";

option go_package = "github.com/rat-dev/rat/gen/rat/engine/v1;enginev1";

service EngineService {
  // Run a statement for effect (DDL, INSERT…SELECT).
  rpc Execute(ExecuteRequest) returns (ExecuteResponse) {
    option (rat.common.v1.capability) = "rat://engine/v1/execute";
  }

  // Run a SELECT; results stream out-of-band as Arrow.
  rpc Query(QueryRequest) returns (QueryResponse) {
    option (rat.common.v1.capability) = "rat://engine/v1/query";
  }

  // Bounded sample of a query/table for inspection.
  rpc Preview(PreviewRequest) returns (PreviewResponse) {
    option (rat.common.v1.capability) = "rat://engine/v1/preview";
  }
}

message ExecuteRequest {
  reserved 1; // RequestContext travels in the rat-callmeta-bin metadata header (ADR-007)
  string sql = 2;
  // Tables referenced by the statement, so the core can resolve providers and
  // the engine can bind them without parsing SQL for refs.
  repeated rat.common.v1.TableRef tables = 3;
}

message ExecuteResponse {
  rat.common.v1.WriteResult result = 1;
}

message QueryRequest {
  reserved 1; // RequestContext travels in the rat-callmeta-bin metadata header (ADR-007)
  string sql = 2;
  repeated rat.common.v1.TableRef tables = 3;
}

message QueryResponse {
  // Out-of-band Arrow endpoint to pull result batches from.
  rat.common.v1.ArrowStream stream = 1;
}

message PreviewRequest {
  reserved 1; // RequestContext travels in the rat-callmeta-bin metadata header (ADR-007)
  string sql = 2;
  repeated rat.common.v1.TableRef tables = 3;
  // Max rows to return in the sample.
  int64 limit = 4;
}

message PreviewResponse {
  rat.common.v1.ArrowStream stream = 1;
}
