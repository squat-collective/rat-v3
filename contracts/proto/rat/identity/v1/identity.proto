// Identity axis service contract. Status: v1 (frozen — rat/1.2; ADR-003: control-plane = one ref + conformance).
//
// A `kind: identity` plugin (static-token, OIDC, mTLS) backs the core's Identity
// Gateway (one of the six core things). Every request the API gateway accepts is
// authenticated here before routing.
//
// Capability mapping:
//   rat://identity/v1/authenticate -> Authenticate (credential -> subject)
//   rat://identity/v1/authorize    -> Authorize    (subject + action -> allow?)
//
// C2 — PLUGIN-TO-CORE AUTH: this axis also resolves the plugin's OWN identity.
// Per reviews/00 Theme 3, v2 already solved this (ADR-020: per-startup platform
// token, constant-time compare). v3 inherits it as a CONTRACT: the default
// identity plugin issues a per-plugin token at registration; Authenticate
// constant-time-compares it. The default is NOT anonymous-root (reviews/04).
//
// NOTE: authz here is COARSE (is this subject allowed this action at all). The
// per-capability call authorization (C5) is enforced by the API gateway against
// the manifest `provides`/`requires`, not re-litigated per identity plugin.
//
// ERROR MODEL (reviews/06 C-5 / freeze-blocker #9), pinned at freeze so authors
// build ONE model:
//   - TRANSPORT/operational failures (backend down, malformed request) -> gRPC
//     canonical status codes.
//   - DECISION outcomes on a SUCCESSFUL rpc (a deny is a successful Authorize, so
//     a status code can't carry it) -> in-band `allowed` bool + enumerated
//     `deny_code`. Free-text `reason` is LOG/AUDIT-ONLY and MUST NOT drive caller
//     logic (returning rich reasons to an untrusted caller is an enumeration
//     oracle, reviews/04). Callers branch on `deny_code`, not `reason`.
syntax = "proto3";

package rat.identity.v1;

import "rat/common/v1/annotations.proto";

option go_package = "github.com/squat-collective/rat-v3/contracts/sdks/go/rat/identity/v1;identityv1";

service IdentityService {
  // rat://identity/v1/authenticate — validate a credential, resolve the subject.
  rpc Authenticate(AuthenticateRequest) returns (AuthenticateResponse) {
    option (rat.common.v1.capability) = "rat://identity/v1/authenticate";
  }

  // rat://identity/v1/authorize — coarse allow/deny for a subject + action.
  rpc Authorize(AuthorizeRequest) returns (AuthorizeResponse) {
    option (rat.common.v1.capability) = "rat://identity/v1/authorize";
  }
}

message AuthenticateRequest {
  // No RequestContext.subject yet — this is what establishes it. Trace fields
  // still apply, so the gateway passes context for correlation only.
  reserved 1; // RequestContext travels in the rat-callmeta-bin metadata header (ADR-007)
  // Opaque credential (bearer token, client-cert chain, etc.). Never logged;
  // `debug_redact` makes that structural (reviews/06 SEC-8).
  bytes credential = 2 [debug_redact = true];
}

message AuthenticateResponse {
  bool authenticated = 1;
  // The resolved subject to stamp onto downstream RequestContext.subject.
  string subject = 2;
  // The tenant this subject belongs to (stamped onto RequestContext.tenant).
  string tenant = 3;
}

message AuthorizeRequest {
  reserved 1; // RequestContext travels in the rat-callmeta-bin metadata header (ADR-007)
  // Action being attempted, e.g. "pipeline.run", "plane.create".
  string action = 2;
  // Optional resource the action targets.
  string resource = 3;
}

// Machine-readable deny reason for Authorize. Callers branch on this, never on
// the free-text reason (anti-enumeration-oracle; see ERROR MODEL above).
enum DenyCode {
  DENY_CODE_UNSPECIFIED = 0; // not a deny (allowed=true) OR reason not supplied
  DENY_CODE_NOT_AUTHENTICATED = 1; // no/invalid subject established
  DENY_CODE_INSUFFICIENT_ROLE = 2; // authenticated but lacks the required role
  DENY_CODE_ACTION_FORBIDDEN = 3; // the action is denied for this subject
  DENY_CODE_RESOURCE_FORBIDDEN = 4; // the specific resource is denied
}

message AuthorizeResponse {
  bool allowed = 1;
  // Machine-readable deny reason when allowed=false. UNSPECIFIED when allowed.
  DenyCode deny_code = 2;
  // Human-readable reason — LOG/AUDIT-ONLY, never returned to drive caller logic
  // (enumeration-oracle risk). Callers branch on deny_code.
  string reason = 3;
}
