// Runtime axis service contract. Status: v1 (frozen — rat/1, ADR-009).
//
// A `kind: runtime` plugin (pyarrow, a container exec runtime, a WASM host, …)
// executes a unit of work on behalf of a strategy/engine. It is the "where does
// the code run" axis — distinct from `deployment-runtime` (where PLUGINS run).
//
// Capability mapping:
//   rat://runtime/v1/execute -> Execute
syntax = "proto3";

package rat.runtime.v1;

import "rat/common/v1/annotations.proto";
import "rat/common/v1/data.proto";

option go_package = "github.com/squat-collective/rat-v3/contracts/sdks/go/rat/runtime/v1;runtimev1";

service RuntimeService {
  // rat://runtime/v1/execute — run a unit of work. Streams progress so the
  // reconciler/UI can show liveness on long tasks; terminal message carries the
  // outcome. Each streamed message is an ExecuteResponse (a progress-or-completed
  // oneof) — named per the *Response convention buf STANDARD requires, even for
  // streaming RPCs. Mediated via core InvokeServerStream (ADR-008).
  rpc Execute(ExecuteRequest) returns (stream ExecuteResponse) {
    option (rat.common.v1.capability) = "rat://runtime/v1/execute";
  }
}

message ExecuteRequest {
  reserved 1; // RequestContext travels in the rat-callmeta-bin metadata header (ADR-007)
  // Opaque work spec the runtime knows how to run (e.g. a serialized plan, a
  // script ref, a container entrypoint). The control plane does not interpret.
  bytes work_spec = 2;
  // Optional input data streams the work consumes.
  repeated rat.common.v1.ArrowStream inputs = 3;
}

// Streamed liveness update during Execute.
message ExecuteProgress {
  // Completion fraction 0.0–1.0. proto3 `optional` for explicit presence: ABSENT
  // == indeterminate progress (replaces the old negative sentinel — reviews/06
  // API-13).
  optional double fraction = 1;
  string message = 2;
}

// Terminal event of an Execute stream.
message ExecuteCompleted {
  bool success = 1;
  // Populated on failure.
  string error = 2;
  rat.common.v1.WriteResult result = 3;
}

// One message in the Execute stream: either an interim progress update or the
// terminal completion.
message ExecuteResponse {
  oneof event {
    ExecuteProgress progress = 1;
    ExecuteCompleted completed = 2;
  }
}
