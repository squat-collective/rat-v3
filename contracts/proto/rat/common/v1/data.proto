// Shared data-plane handoff types referenced across data-plane axes
// (strategy ↔ runtime ↔ format). Status: v1 (frozen — rat/1, ADR-009).
//
// Design invariant (overview.md "Data plane bypasses core for bytes"): the
// CONTROL-plane RPCs carry references + small metadata, NEVER bulk row data.
// Bulk data moves out-of-band as Arrow IPC over a side channel the plugins
// negotiate. So these messages describe WHERE/HOW to get the data, not the data.
syntax = "proto3";

package rat.common.v1;

option go_package = "github.com/rat-dev/rat/gen/rat/common/v1;commonv1";

// A reference to a table/dataset, resolvable by a format/catalog plugin.
// Deliberately opaque-ish: the format plugin interprets `uri` per its own
// scheme; the control plane just routes it.
message TableRef {
  // Catalog-qualified identifier, e.g. "warehouse.sales.orders".
  string identifier = 1;
  // Optional storage/format URI hint, e.g. "s3://bucket/warehouse/orders".
  string uri = 2;
  // Optional catalog branch/snapshot selector (catalog plugins that support it).
  string branch = 3;
}

// The wire protocol of an out-of-band data stream. PINNED at freeze
// (reviews/06 AUTH-3): "gRPC/Flight-style" was not a spec — two authors would
// build incompatible channels. Arrow Flight (DoGet/DoPut) is the v1 protocol; a
// new major may add others, but a given ArrowStream names exactly one.
enum ArrowTransport {
  ARROW_TRANSPORT_UNSPECIFIED = 0;
  // Apache Arrow Flight. PRODUCER_HOSTED → consumer calls DoGet(ticket);
  // CONSUMER_HOSTED → producer calls DoPut(ticket).
  ARROW_TRANSPORT_FLIGHT = 1;
}

// Which party HOSTS the endpoint (the other party dials). PINNED at freeze
// (reviews/06 AUTH-3): the same ArrowStream type is used in opposite directions —
// format.Resolve returns a producer-hosted stream the consumer pulls; the source
// on format.Append/Merge is a stream the format pulls from a caller-hosted
// endpoint. Without this field the holder can't tell whether to host or dial.
enum ArrowStreamRole {
  ARROW_STREAM_ROLE_UNSPECIFIED = 0;
  // The producer hosts `endpoint`; the consumer dials it to READ (Flight DoGet).
  ARROW_STREAM_ROLE_PRODUCER_HOSTED = 1;
  // The consumer hosts `endpoint`; the producer dials it to WRITE (Flight DoPut).
  ARROW_STREAM_ROLE_CONSUMER_HOSTED = 2;
}

// An Arrow data stream endpoint — the out-of-band side channel for bulk bytes.
// One party hosts `endpoint`; the other dials it (see `role`). The control-plane
// RPC only exchanges this descriptor, keeping bulk data off the core path.
message ArrowStream {
  // Endpoint the dialing party connects to for record batches.
  string endpoint = 1;
  // Opaque ticket that authorizes + identifies this stream. SECURITY (reviews/06
  // SEC-14): a conformant producer MUST issue tickets that are short-TTL,
  // single-use, and bound to {caller_plugin, tenant, this stream} so a
  // leaked/guessed ticket can't be replayed for cross-tenant data access. (The
  // bytes leg bypasses the core, so the ticket is the only gate.) The detailed
  // ticket-format spec is enforcement-layer (GA); the field is here so it's in
  // the frozen shape.
  bytes ticket = 2 [debug_redact = true];
  // Arrow IPC schema (serialized) so the dialing party can validate before
  // transferring.
  bytes ipc_schema = 3;
  // The wire protocol of this stream. MUST be set (UNSPECIFIED is rejected).
  ArrowTransport transport = 4;
  // Which party hosts `endpoint`. MUST be set so the holder knows host-vs-dial.
  ArrowStreamRole role = 5;
}

// Outcome envelope reused by data-plane mutating RPCs.
message WriteResult {
  // Rows affected. proto3 `optional` for explicit presence: ABSENT == the
  // engine/format cannot report a count (replaces the old -1 sentinel —
  // reviews/06 API-13). Present 0 means "zero rows", distinctly from "unknown".
  optional int64 rows_affected = 1;
  // Resulting version id of the written table state. proto3 `optional` for explicit
  // presence (A1, reviews/08 — the sibling fix to rows_affected's, absorbed into the
  // `rat/1` re-cut before publication): ABSENT == the engine/format cannot report a
  // version; present-empty == the write produced no version (unversioned format);
  // present-nonempty == the version id. Set by a versioned format/table (a snapshot
  // id) or by an engine whose write produced a new table version.
  optional string snapshot_id = 2;
}
