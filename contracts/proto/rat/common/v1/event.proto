// Async event-bus envelope. DRAFT — freeze-blocker #7.
//
// This is the wire contract for the ASYNC plane (reviews/06 ARCH-1). The event
// bus is one of the six core things (overview.md): the reconciler emits events
// (pipeline_run_requested, *_completed, *_failed, plugin_installed, …) and N
// plugins react without coupling — "the core never tells anyone to do anything."
//
// THE GAP THIS CLOSES: every SYNC rpc carries common.v1.RequestContext (trace +
// identity + tenant), but until now the async plane had NO envelope at all — so
// distributed tracing broke across the async boundary (the main coordination
// path), and multi-tenant event routing/isolation was undefined. An Event now
// carries the SAME RequestContext, so a `pipeline_run_failed` can be traced back
// through the `pipeline_run_requested` that caused it, across every reacting
// plugin, within one correlation_id — and the bus can route/filter by tenant.
//
// FREEZE NOTE: this envelope is part of the frozen rat/1 surface. Per ADR-002 D2
// the bus PROTOCOL is fixed (this message) while the TRANSPORT is pluggable
// (NATS JetStream default — ADR-002 D4 — / Kafka / Redis Streams); a
// `kind: <bus-transport>` plugin carries Events without interpreting `payload`.
//
// IDENTITY ON THE ASYNC HOP: `context.identity` is stamped by the CORE at emit
// time (the emitter is the core reconciler or a core-mediated plugin call), same
// non-forgeable rules as the keystone (context.proto). A subscriber READS it for
// its own logic + audit; it is not caller-asserted on the bus.
//
// Status: DRAFT (pre-freeze).
syntax = "proto3";

package rat.common.v1;

import "rat/common/v1/context.proto";

option go_package = "github.com/rat-dev/rat/gen/rat/common/v1;commonv1";

// One event on the bus. Published by the core (or a core-mediated plugin),
// delivered to every subscriber whose subscription matches `type`.
message Event {
  // Trace + identity + tenant for this event — the SAME envelope sync RPCs carry
  // (context.proto). correlation_id chains the event to the operation that
  // produced it; identity.tenant scopes routing/isolation; traceparent continues
  // the distributed trace across the async hop. Core-stamped at emit time.
  RequestContext context = 1;

  // Globally-unique id for THIS event instance. Used for idempotent delivery:
  // a subscriber that has already processed this event_id MUST treat redelivery
  // as a no-op (at-least-once transports redeliver). Distinct from
  // context.correlation_id (which is shared by all events of one operation).
  string event_id = 2;

  // The event type, e.g. "pipeline_run_requested", "pipeline_run_completed",
  // "pipeline_run_failed", "plugin_installed", "plane_warmed". Subscriptions
  // match on this (overview.md reconciliation model: subscriptions = [event,
  // action]). Convention: lower_snake_case; the open-set is not enumerated
  // centrally (community event types are allowed, namespaced by emitter).
  string type = 3;

  // When the event occurred (unix epoch millis). Consistent with the int64-ms
  // timestamp convention used across the contracts.
  int64 timestamp_unix_ms = 4;

  // The emitting component: the core reconciler ("rat-core") or the plugin id of
  // a core-mediated emitter. Set by the core; lets subscribers + audit attribute
  // the event. (Mirrors identity.caller_plugin semantics for the async path.)
  string source = 5;

  // The event payload — a serialized, type-specific message whose schema is
  // implied by `type`. Opaque to the bus transport (which routes by `type` +
  // tenant without interpreting it), exactly as core/v1/invoke.proto's payload is
  // opaque to the gateway. Subscribers decode it per the documented type.
  bytes payload = 6;

  // Optional ordering key. Events sharing a partition_key are delivered to a
  // subscriber in emit order (e.g. all events for one pipeline run, keyed by its
  // run id), where the transport supports partitioned/ordered delivery. Empty ==
  // no ordering guarantee beyond the transport's default.
  string partition_key = 7;
}
