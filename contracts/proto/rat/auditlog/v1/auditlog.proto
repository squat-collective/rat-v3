// Audit-log axis service contract. Status: v1 (frozen — rat/1.2; ADR-003: control-plane = one ref + conformance).
//
// A `kind: audit-log` plugin (file, syslog, SIEM, immutable object store) is a
// SINK for the core's audit stream.
//
// CRITICAL (reviews/04 I8 — mandatory audit trail): unlike most axes, audit
// emission is NOT optional. The core ALWAYS emits an append-only, tamper-evident
// record of security-relevant events (plugin installs, binding changes,
// credential vends, auth decisions) — even when NO audit-log plugin is installed
// (it falls back to a core-local append-only store). "audit-log: none" must NOT
// mean "no audit". This plugin axis decides WHERE the trail goes, never WHETHER
// it exists. That is why audit is in the core's enforcement layer
// (plugin-architecture.md cross-cutting concerns), and this axis is only the
// export sink.
//
// Capability mapping:
//   rat://auditlog/v1/append -> Append
//
// FREEZE-BLOCKER #4 (reviews/06 C-3 = SEC-5 ⊕ API-5). The earlier draft was
// "tamper-evident" in name only. Four fixes, all on the wire here:
//
//   1. CORE AUTHORS THE CHAIN, NOT THE SINK OR AN ARBITRARY CALLER. `id` and
//      `prev_hash` are assigned by the core, which serializes all audit events
//      into ONE linear chain. Append is CORE-ONLY: the capability is not
//      grantable to ordinary plugins, so no plugin can inject records or fork
//      the chain, and concurrent emitters can't race `prev_hash`.
//   2. EACH RECORD IS CORE-SIGNED (Ed25519 over the canonical serialization).
//      A third-party sink can VERIFY the chain but cannot FORGE or silently
//      rewrite/reorder/drop records without detection. "must not allow mutation"
//      is now cryptographically checkable, not a comment the sink may ignore.
//   3. CANONICAL SERIALIZATION IS PINNED (see AuditRecord) so every
//      implementation hashes+signs the same bytes — cross-impl verification is
//      well-defined. This is un-retrofittable once chains exist, hence pre-freeze.
//   4. THE RESPONSE REPORTS PER-RECORD STATUS, COMMIT IS PREFIX-ONLY. The old
//      `appended: int64` hid partial failure — committing records[0]+[2] while
//      rejecting [1] forks the chain. Now `AppendResponse.acks` is per-record and
//      commit is a contiguous PREFIX: a REJECTED entry means every later record
//      in the request is uncommitted. A chain-head watermark lets a reconnecting
//      emitter resume with no gap/fork.
//
// Two prose invariants the contract assumes:
//   - A REJECTED or DROPPED audit record is ITSELF an auditable event — the core
//     emits a meta-audit entry; "mandatory" means a record cannot be lost
//     silently.
//   - APPEND_STATUS_DUPLICATE is the idempotent-retry safety valve: the core-only
//     + signed model forces retry on transport failure, so re-appending an
//     already-stored record MUST NOT double-append or fork — the sink acks
//     DUPLICATE.
syntax = "proto3";

package rat.auditlog.v1;

import "rat/common/v1/audit.proto";

option go_package = "github.com/rat-dev/rat/gen/rat/auditlog/v1;auditlogv1";

// NOTE (0c): the cross-cutting audit RECORD — common.v1.AuditRecord +
// common.v1.AuditOutcome — lives in common/v1/audit.proto, because the CORE authors
// + signs + emits it even when NO audit-log plugin is installed. This axis is only
// the export SINK; the messages below are its Append SERVICE wire shapes.

service AuditLogService {
  // rat://auditlog/v1/append — append core-authored, core-signed audit records
  // to the sink. CORE-ONLY: this capability is not grantable to ordinary
  // plugins. Records are also retained core-locally, so the sink is a fan-out,
  // not the only copy.
  rpc Append(AppendRequest) returns (AppendResponse);
}

message AppendRequest {
  reserved 1; // RequestContext travels in the rat-callmeta-bin metadata header (ADR-007)
  // Core-authored, core-signed records to append, in chain order.
  repeated rat.common.v1.AuditRecord records = 2;
}

// Per-record disposition of an Append.
enum AppendStatus {
  APPEND_STATUS_UNSPECIFIED = 0;
  // Durably stored and chain-linked.
  APPEND_STATUS_COMMITTED = 1;
  // Already stored (idempotent retry) — NOT an error; the chain is intact.
  APPEND_STATUS_DUPLICATE = 2;
  // Not stored. See reject_code. Implies prefix-only: every later record in the
  // same request is also uncommitted.
  APPEND_STATUS_REJECTED = 3;
}

enum RejectCode {
  REJECT_CODE_UNSPECIFIED = 0;
  // Signature did not verify against the core's key.
  REJECT_CODE_BAD_SIGNATURE = 1;
  // prev_hash does not match the sink's current chain head (gap/fork attempt).
  REJECT_CODE_CHAIN_BREAK = 2;
  // Sink-side durable-storage failure (retryable).
  REJECT_CODE_STORAGE_ERROR = 3;
}

// Ack for one record in the request; acks[i] corresponds to records[i].
message RecordAck {
  // The core-assigned id this ack refers to (mirrors records[i].id).
  string id = 1;
  AppendStatus status = 2;
  // Set only when status == APPEND_STATUS_REJECTED.
  RejectCode reject_code = 3;
}

message AppendResponse {
  // Per-record acks in request order. COMMIT IS PREFIX-ONLY: once a record is
  // REJECTED, all later records in the request are uncommitted (never acked
  // COMMITTED), so the committed set is always a contiguous prefix — the chain
  // can't fork on partial failure.
  repeated RecordAck acks = 1;
  // Chain head after this append: the id + canonical-hash of the last durably
  // committed record. A reconnecting emitter resumes deterministically from here
  // with no gap/fork; also distinguishes "dropped" (absent from the chain) from
  // "in-flight".
  string last_committed_id = 2;
  string last_committed_hash = 3;
}
