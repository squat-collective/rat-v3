// Scheduler-backend axis service contract. Status: v1 (frozen — rat/1.2; ADR-003: control-plane = one ref + conformance).
//
// A `kind: scheduler-backend` plugin (in-process timer, cron, Temporal,
// cloud scheduler) owns "fire this at this time / on this interval". The
// reconciler asks it WHEN; the reconciler still decides WHAT (overview.md
// reconciliation model — the scheduler is a clock, not an orchestrator).
//
// Capability mapping:
//   rat://scheduler/v1/schedule   -> Schedule
//   rat://scheduler/v1/cancel     -> Cancel
//   rat://scheduler/v1/watch-due  -> WatchDue (stream of fired triggers)
syntax = "proto3";

package rat.scheduler.v1;

import "rat/common/v1/annotations.proto";

option go_package = "github.com/le-squat/rat/gen/rat/scheduler/v1;schedulerv1";

service SchedulerService {
  // rat://scheduler/v1/schedule — register a trigger (cron expr or one-shot).
  rpc Schedule(ScheduleRequest) returns (ScheduleResponse) {
    option (rat.common.v1.capability) = "rat://scheduler/v1/schedule";
  }

  // rat://scheduler/v1/cancel — remove a previously-registered trigger.
  rpc Cancel(CancelRequest) returns (CancelResponse) {
    option (rat.common.v1.capability) = "rat://scheduler/v1/cancel";
  }

  // rat://scheduler/v1/watch-due — stream of triggers as they fire. The
  // reconciler consumes this to know a pipeline is due.
  //
  // DELIVERY SEMANTICS (reviews/06 API-11, pinned at freeze): AT-LEAST-ONCE. A
  // fired trigger MAY be redelivered (e.g. if the consumer reconnects), so the
  // reconciler MUST treat WatchDue delivery as idempotent — it keys actions by
  // (trigger_id, fired_at_unix_ms) and ignores a duplicate. The scheduler does
  // NOT guarantee a trigger is delivered exactly once or that a missed delivery
  // is dropped; a consumer that was disconnected when a trigger fired re-derives
  // due-ness from declared schedule state on reconnect (the reconciler already
  // re-evaluates schedules each loop). A richer ack/lease mechanism is additive
  // (GA); the at-least-once guarantee is what's pinned now.
  rpc WatchDue(WatchDueRequest) returns (stream WatchDueResponse) {
    option (rat.common.v1.capability) = "rat://scheduler/v1/watch-due";
  }
}

message ScheduleRequest {
  reserved 1; // RequestContext travels in the rat-callmeta-bin metadata header (ADR-007)
  // Caller-chosen id, used to cancel + to correlate fired triggers.
  string trigger_id = 2;
  // Cron expression; if empty, `at_unix_ms` is used for a one-shot.
  string cron = 3;
  int64 at_unix_ms = 4;
}

message ScheduleResponse {
  string trigger_id = 1;
}

message CancelRequest {
  reserved 1; // RequestContext travels in the rat-callmeta-bin metadata header (ADR-007)
  string trigger_id = 2;
}

message CancelResponse {
  bool cancelled = 1;
}

message WatchDueRequest {
  reserved 1; // RequestContext travels in the rat-callmeta-bin metadata header (ADR-007)
}

// One fired trigger.
message WatchDueResponse {
  string trigger_id = 1;
  int64 fired_at_unix_ms = 2;
}
