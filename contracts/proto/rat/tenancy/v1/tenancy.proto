// Tenancy axis service contract. Status: v1 (frozen — rat/1.2; ADR-003: control-plane = one ref + conformance).
//
// A `kind: tenancy` plugin decides tenant-boundary questions the core asks at
// decision points (a permission check, a sharing grant, a quota test).
//
// Capability mapping:
//   rat://tenancy/v1/decide -> Decide (a generic decision hook)
//
// C7 — TENANCY IS STRUCTURAL, NOT ADVISORY (reviews/00 Theme 4, reviews/01
// Finding 3): the tenant dimension lives in core primitives (RequestContext.identity.tenant
// threads every RPC; the state gateway namespaces by it; storage vends creds
// scoped to it). This plugin does NOT re-implement isolation — the core enforces
// it structurally. The plugin only answers POLICY questions the core can't
// hardcode (e.g. "may tenant A share dataset X with tenant B?"). The dangerous
// reading the review flagged — "isolation is an emergent property of 4 plugins
// agreeing" — is rejected: isolation is the core's job; this plugin is policy on
// top of an already-enforced boundary.
//
// v1 SCOPE — ISOLATION-ONLY (Q02 PU-4, ADR-017; ratified 2026-06-02): v1 tenancy is
// ISOLATION-ONLY. The core structurally enforces tenant ISOLATION (equality on
// RequestContext.identity.tenant across the state gateway, storage cred-vending, and
// the invoke gateway), and this plugin may DECIDE permission/quota questions the core
// then enforces. But DECISION_KIND_SHARING is ADVISORY-NOT-ENFORCED in v1: there is
// deliberately NO frozen primitive by which an *allowed* cross-tenant share is
// ACTIONED — no delegated-tenant / grant shape exists in the state or storage wire, so
// a plugin returning allowed=true for a SHARING decision computes a verdict the core
// CANNOT carry into a cross-tenant grant. Actioned cross-tenant sharing + hierarchical
// tenancy are a deferred `v2` (a delegation primitive in state/storage — its own ADR,
// only if a user pulls for it). Treat DECISION_KIND_SHARING as informational /
// policy-signalling in v1, not as an enforceable grant. (Q02 architect F5: "decidable
// but un-actionable"; the cheap, honest scope is to enforce only the isolation v1
// actually has.)
//
// ERROR MODEL (reviews/06 C-5 / freeze-blocker #9): same convention as
// identity.Authorize — transport/operational failures use gRPC status; a deny on
// a successful Decide uses the in-band `allowed` bool + enumerated `deny_code`;
// `reason` is LOG/AUDIT-ONLY and MUST NOT drive caller logic (enumeration oracle).
syntax = "proto3";

package rat.tenancy.v1;

import "rat/common/v1/annotations.proto";

option go_package = "github.com/squat-collective/rat-v3/gen/rat/tenancy/v1;tenancyv1";

service TenancyService {
  // rat://tenancy/v1/decide — answer a policy decision the core poses at a hook
  // point. The core enforces the verdict; the plugin only computes it.
  rpc Decide(DecideRequest) returns (DecideResponse) {
    option (rat.common.v1.capability) = "rat://tenancy/v1/decide";
  }
}

enum DecisionKind {
  DECISION_KIND_UNSPECIFIED = 0;
  DECISION_KIND_PERMISSION = 1;
  // v1: ADVISORY-NOT-ENFORCED — decidable but NOT actioned (no delegated-tenant grant
  // primitive in the v1 wire). See the "v1 SCOPE — ISOLATION-ONLY" note above
  // (Q02 PU-4 / ADR-017). Actioned sharing is a deferred v2.
  DECISION_KIND_SHARING = 2;
  DECISION_KIND_QUOTA = 3;
}

message DecideRequest {
  reserved 1; // RequestContext travels in the rat-callmeta-bin metadata header (ADR-007)
  DecisionKind kind = 2;
  // The action/resource under question (e.g. "share:dataset/orders").
  string subject_action = 3;
  // For cross-tenant decisions: the other tenant involved (empty otherwise).
  string counterparty_tenant = 4;
}

// Machine-readable deny reason for Decide. Callers branch on this, never on the
// free-text reason (anti-enumeration-oracle; see ERROR MODEL above).
enum DenyCode {
  DENY_CODE_UNSPECIFIED = 0; // not a deny (allowed=true) OR reason not supplied
  DENY_CODE_POLICY_FORBIDDEN = 1; // a tenancy policy forbids it
  DENY_CODE_QUOTA_EXCEEDED = 2; // a quota/limit was exceeded
  DENY_CODE_CROSS_TENANT_DENIED = 3; // the cross-tenant share/access is denied
}

message DecideResponse {
  bool allowed = 1;
  // Machine-readable deny reason when allowed=false. UNSPECIFIED when allowed.
  DenyCode deny_code = 2;
  // Human-readable reason — LOG/AUDIT-ONLY (enumeration-oracle risk). Callers
  // branch on deny_code.
  string reason = 3;
}
