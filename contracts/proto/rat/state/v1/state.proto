// State-backend axis service contract. DRAFT — sub-phase 0b.
//
// A `kind: state-backend` plugin (sqlite, postgres, etcd, …) backs the core's
// State Gateway (one of the six core things). This is a TIER-0 plugin
// (bootstrap-critical, selected at boot — plugin-architecture.md): the core
// cannot start without it.
//
// Capability mapping:
//   rat://state/v1/get   -> Get
//   rat://state/v1/put   -> Put
//   rat://state/v1/list  -> List
//   rat://state/v1/watch -> Watch
//
// C3 — STATE-GATEWAY ISOLATION: every key is namespaced per-plugin and
// per-tenant. The gateway derives the effective namespace from
// RequestContext.identity.caller_plugin (the immediate calling plugin,
// server-derived per hop — keystone, context.proto) + RequestContext.identity.tenant
// and PREFIXES it onto `key` server-side; a plugin physically cannot address
// another plugin's or another tenant's keys. Cross-plugin access is
// deny-by-default. The `key`/`prefix` fields below are plugin-relative, NOT global.
//
// KEY GRAMMAR (reviews/06 SEC-2, freeze-blocker #3): `key`/`prefix` are
// constrained so namespace prefixing is a real boundary, not naive string concat
// a crafted value can escape. A conformant gateway MUST reject any key/prefix
// that:
//   - is empty (key; prefix MAY be empty == "all of my namespace"),
//   - exceeds 512 bytes,
//   - is not valid UTF-8,
//   - contains a NUL byte (\x00) or any ASCII control char (< 0x20),
//   - contains a path-traversal segment: a "." or ".." path component, or the
//     sequence "../" / "..\\" anywhere.
// Allowed: printable UTF-8 with `/` as a logical separator (the gateway's own
// namespace prefix is applied server-side and is NOT part of this grammar — the
// plugin never writes the namespace). Rejection surfaces as INVALID_ARGUMENT.
// This grammar is a CONFORMANCE obligation (see below), not just prose.
//
// C5 / CAS — the Put compare-and-set primitive is what the reconciler's
// leader-election lease (ADR-002 D5) is built on. CONFORMANCE OBLIGATION
// (reviews/06 C-4 / ARCH-3): a state-backend MUST provide single-key
// LINEARIZABLE compare-and-set and ORDERED Watch to be eligible as the lease
// backend of a multi-replica deployment, and the axis conformance suite
// (sub-phase 0f) gates on it with golden vectors — it is NOT an honor-system
// comment. A backend that can only offer eventually-consistent reads (e.g.
// DynamoDB in its default read mode) MUST either run in a strongly-consistent
// mode or declare itself solo-only; it MUST NOT silently back a multi-replica
// lease, because two stale CAS reads → two leaders → split-brain reconcile.
// DynamoDB is therefore NOT in the advertised multi-replica state-backend set
// unless configured for strongly-consistent reads (overview.md topology note).
syntax = "proto3";

package rat.state.v1;

import "rat/common/v1/annotations.proto";

option go_package = "github.com/rat-dev/rat/gen/rat/state/v1;statev1";

service StateService {
  // rat://state/v1/get — read one key (plugin+tenant relative).
  rpc Get(GetRequest) returns (GetResponse) {
    option (rat.common.v1.capability) = "rat://state/v1/get";
  }

  // rat://state/v1/put — write one key, optionally compare-and-set on revision.
  rpc Put(PutRequest) returns (PutResponse) {
    option (rat.common.v1.capability) = "rat://state/v1/put";
  }

  // rat://state/v1/list — list keys under a plugin+tenant-relative prefix.
  rpc List(ListRequest) returns (ListResponse) {
    option (rat.common.v1.capability) = "rat://state/v1/list";
  }

  // rat://state/v1/watch — stream changes under a prefix (reconciler/event use).
  // Each streamed message is a WatchResponse — named per the *Response convention
  // buf STANDARD requires, even for streaming RPCs. Mediated via core
  // InvokeServerStream (ADR-008).
  rpc Watch(WatchRequest) returns (stream WatchResponse) {
    option (rat.common.v1.capability) = "rat://state/v1/watch";
  }
}

message GetRequest {
  reserved 1; // RequestContext travels in the rat-callmeta-bin metadata header (ADR-007)
  // Plugin-relative key; subject to KEY GRAMMAR (file header). Non-empty.
  string key = 2;
}

message GetResponse {
  bool found = 1;
  bytes value = 2;
  // Monotonic revision for CAS / optimistic concurrency.
  int64 revision = 3;
}

message PutRequest {
  reserved 1; // RequestContext travels in the rat-callmeta-bin metadata header (ADR-007)
  // Plugin-relative key; subject to KEY GRAMMAR (file header). Non-empty.
  string key = 2;
  bytes value = 3;
  // CAS: if > 0, the put succeeds only if the current revision matches.
  // 0 == unconditional write. This backs leader-election leases (ADR-002 D5).
  int64 if_revision = 4;
}

// The outcome of a Put. The old `committed: bool` could not distinguish a lost
// CAS race from an unavailable backend from a maybe-committed timeout — fatal for
// lease fencing (reviews/06 C-4 / API-1 reconciler axis). PutOutcome makes the
// three cases explicit on the wire.
enum PutOutcome {
  PUT_OUTCOME_UNSPECIFIED = 0;
  // The write was durably committed. `revision` is the new revision.
  PUT_OUTCOME_COMMITTED = 1;
  // CAS precondition failed: current revision != if_revision. Deterministic —
  // the caller should re-read and decide (a leader that loses this steps down).
  // The write did NOT happen. `revision` carries the current (conflicting) rev.
  PUT_OUTCOME_CONFLICT = 2;
  // The backend could not confirm the result (timeout, partition, dropped
  // response): the write may or may not have committed. The caller MUST treat
  // its state as unknown — a lease renewal that returns UNKNOWN cannot be relied
  // on for fencing and the holder must assume it may have lost the lease. NOT
  // safe to blindly retry a CAS on this without re-reading the revision first.
  PUT_OUTCOME_UNKNOWN = 3;
}

message PutResponse {
  PutOutcome outcome = 1;
  // New revision on COMMITTED; the current conflicting revision on CONFLICT;
  // unspecified (0) on UNKNOWN.
  int64 revision = 2;
}

message ListRequest {
  reserved 1; // RequestContext travels in the rat-callmeta-bin metadata header (ADR-007)
  // Plugin-relative prefix; subject to KEY GRAMMAR (file header). MAY be empty
  // (== list all of this plugin+tenant namespace).
  string prefix = 2;
}

message ListResponse {
  repeated string keys = 1;
}

message WatchRequest {
  reserved 1; // RequestContext travels in the rat-callmeta-bin metadata header (ADR-007)
  // Plugin-relative prefix; subject to KEY GRAMMAR (file header). MAY be empty.
  string prefix = 2;
  // Resume from this revision (0 == from now).
  int64 from_revision = 3;
}

message WatchResponse {
  enum Type {
    TYPE_UNSPECIFIED = 0;
    TYPE_PUT = 1;
    TYPE_DELETE = 2;
  }
  Type type = 1;
  string key = 2;
  bytes value = 3;
  int64 revision = 4;
}
