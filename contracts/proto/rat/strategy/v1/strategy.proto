// Strategy axis service contract. Status: v1 (frozen — rat/1.1, ADR-009 trigger:
// two strategy references — fullrefresh-py + scd2-py — validate the contract).
//
// A `kind: strategy` plugin (scd2, soft-delete, full-refresh, …) encodes HOW
// data is transformed/loaded. It is the cleanest expression of the capability
// model: a strategy `requires` format-capabilities (scan/merge/append) +
// a runtime, and works across EVERY format that provides them without naming any
// (reviews/02: "the cleanest idea in the whole design").
//
// Capability mapping:
//   rat://strategy/v1/apply -> Apply
syntax = "proto3";

package rat.strategy.v1;

import "rat/common/v1/annotations.proto";
import "rat/common/v1/data.proto";

option go_package = "github.com/squat-collective/rat-v3/contracts/sdks/go/rat/strategy/v1;strategyv1";

service StrategyService {
  // rat://strategy/v1/apply — apply the strategy for one pipeline run. The
  // strategy orchestrates its required capabilities (e.g. Resolve source via a
  // a format capability, transform via a runtime, Write back via a
  // format capability) — but it does so by capability, never by plugin name.
  // The strategy reaches those providers through the core capability-invoke
  // gateway (core/v1 Invoke, ADR-005), which resolves each capability URI to a
  // concrete provider via the registry and mediates the call.
  rpc Apply(ApplyRequest) returns (ApplyResponse) {
    option (rat.common.v1.capability) = "rat://strategy/v1/apply";
  }
}

message ApplyRequest {
  reserved 1; // RequestContext travels in the rat-callmeta-bin metadata header (ADR-007)
  // Source dataset to read from.
  rat.common.v1.TableRef source = 2;
  // Target dataset to write into.
  rat.common.v1.TableRef target = 3;
  // Strategy-specific options. ENCODING PINNED (reviews/06 API-12): these bytes
  // are UTF-8 JSON, validated against the plugin's own metadata_schema (manifest).
  // Opaque to the core (it does not parse them); the strategy decodes per its
  // declared schema. Pinned at freeze so the bytes field's meaning can't shift.
  bytes options = 4;
  // Stable id for THIS logical run (e.g. the run id). The strategy threads it down to
  // its format writes (format.*Request.idempotency_key) so a re-applied run is
  // idempotent END-TO-END under an at-least-once scheduler (C1, ADR-012). Empty == not
  // idempotent.
  string idempotency_key = 5;
}

message ApplyResponse {
  rat.common.v1.WriteResult result = 1;
}
