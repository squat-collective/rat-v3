// Core capability-invoke service. DRAFT — freeze-blocker #6.
//
// This is the wire artifact ADR-005 requires and reviews/06 C-6 (AUTH-2 ⊕
// ARCH-2) flagged as missing: the mechanism by which a plugin actually CALLS a
// capability it `requires`. Before this, "the core wires providers in via the
// registry" was asserted in comments with no wire mechanism — the headline
// call-by-capability feature was unbuildable.
//
// MODEL — CORE-MEDIATED (ADR-005). A plugin does NOT dial providers directly.
// It calls Invoke on the core's API gateway with a capability URI + the
// already-serialized request for the target axis method. The core:
//   1. resolves the capability URI -> concrete provider via the registry,
//   2. enforces the cross-cutting properties on this hop — C2 (caller
//      authenticated), C5 (caller's manifest `requires` this capability AND the
//      provider `provides` it; the capability⇄method binding comes from the
//      (rat.common.v1.capability) method option, freeze-blocker #5),
//      C7 (tenant scoping), C3 (state-namespace derivation),
//   3. stamps/propagates C1 trace + re-derives identity.caller_plugin for the
//      downstream hop (keystone, context.proto), and emits the C8 audit record,
//   4. proxies `payload` to the provider's method and relays its response.
//
// GENERIC PROXY: the gateway routes by `capability` and forwards `payload`
// WITHOUT interpreting it — it gains no per-axis knowledge, so the six-thing core
// stays minimal (no 7th thing; this is the API gateway + registry doing their
// existing jobs). `payload` is the serialized axis request message (e.g. a
// rat.format.v1.MergeRequest); `result` is the serialized axis response.
//
// NOT here: the bulk-data path. Per "data plane bypasses core for bytes"
// (overview.md), Arrow byte transfer still flows plugin-to-plugin via
// common/v1/data.proto ArrowStream and never traverses this service — Invoke
// carries only control RPCs (refs, metadata, stream descriptors).
//
// Status: DRAFT (pre-freeze). Must exist in the frozen rat/1 surface.
syntax = "proto3";

package rat.core.v1;

option go_package = "github.com/rat-dev/rat/gen/rat/core/v1;corev1";

// CapabilityInvokeService has one Invoke variant per RPC cardinality (ADR-008).
// All three are GENERIC byte-relays: the core enforces C2/C5/C7/C8 + traceparent
// and stamps the downstream rat-callmeta-bin envelope (ADR-007) ONCE at the call
// (for streams: once at stream-open), then relays opaque payload/result frames
// without deserializing them. The caller's SDK picks the variant from the target
// capability's cardinality. Bulk data (if any) still flows out-of-band via the
// ArrowStream descriptors inside the relayed frames — never through this service.
service CapabilityInvokeService {
  // Unary→unary capabilities. One request, one response.
  rpc Invoke(InvokeRequest) returns (InvokeResponse);

  // Server-streaming capabilities (e.g. runtime.Execute, state.Watch,
  // scheduler.WatchDue). One request opens the call; the core relays a stream of
  // responses, each `result` being one serialized axis response frame. Enforcement
  // + identity-stamp happen once at open; one C8 audit record per stream.
  rpc InvokeServerStream(InvokeServerStreamRequest) returns (stream InvokeServerStreamResponse);

  // Bidirectional capabilities (e.g. observability.Ingest) — and pure
  // client-streaming (the provider returns a single response frame). The FIRST
  // request frame establishes `capability` (and triggers enforcement); subsequent
  // request frames carry only `payload` and MUST leave `capability` empty.
  rpc InvokeBidiStream(stream InvokeBidiStreamRequest) returns (stream InvokeBidiStreamResponse);
}

// The three Invoke variants carry the SAME {capability, payload} → {result}
// envelope, but buf STANDARD (RPC_REQUEST_RESPONSE_UNIQUE) requires a distinct
// request/response per RPC — which also lets each cardinality evolve + document
// its own framing semantics independently (ADR-008). Context never rides in any of
// them; it is in the rat-callmeta-bin metadata header (ADR-007).

message InvokeRequest {
  // Call context (trace + identity + deadline) does NOT travel here. It rides in
  // the `rat-callmeta-bin` transport-metadata header on the Invoke RPC, as on
  // every control hop (ADR-007). The core reads it from metadata, validates
  // traceparent, re-derives identity.caller_plugin for the downstream hop from
  // THIS request's authenticated channel (wire-supplied identity is not trusted —
  // keystone, context.proto), and stamps a fresh envelope onto the provider call.
  // Keeping it out of the body is what lets the gateway forward `payload` without
  // deserializing it (ADR-005 generic proxy).
  reserved 1; // was `RequestContext context` — moved to rat-callmeta-bin (ADR-007)

  // The capability being invoked, e.g. "rat://format/v1/merge". MUST match the
  // rat://<axis>/v<major>/<capability> grammar. The core resolves this to a
  // concrete provider + method via the registry + the (rat.common.v1.capability)
  // method annotation, and checks the caller's manifest `requires` it.
  string capability = 2;

  // The serialized request message for the target axis method (e.g. an encoded
  // rat.format.v1.MergeRequest). Opaque to the core — routed, not interpreted.
  // The target method is determined by `capability`, so the message type is
  // implied by the capability, not carried here.
  bytes payload = 3;
}

message InvokeResponse {
  // The serialized response message from the provider's method (e.g. an encoded
  // rat.format.v1.MergeResponse). Opaque to the core.
  //
  // Note: this contract returns the provider's success payload; failures surface
  // via gRPC status (transport/enforcement) per the canonical error model
  // ([common/v1/ERROR_MODEL.md], pinned at rat/1). Capability-not-authorized
  // (PERMISSION_DENIED), provider-unavailable (UNAVAILABLE), and unauthenticated
  // caller (UNAUTHENTICATED) are core-side enforcement failures returned as those
  // gRPC status codes, not as a field here.
  bytes result = 1;
}

// --- server-streaming variant (ADR-008) ---

message InvokeServerStreamRequest {
  reserved 1; // context rides in the rat-callmeta-bin metadata header (ADR-007)
  // The capability being invoked; same grammar + resolution as InvokeRequest. Must
  // resolve to a server-streaming provider method.
  string capability = 2;
  // The serialized request message for the target method (e.g. an encoded
  // rat.runtime.v1.ExecuteRequest). Opaque to the core.
  bytes payload = 3;
}

message InvokeServerStreamResponse {
  // One serialized axis response frame (e.g. an encoded
  // rat.runtime.v1.ExecuteResponse). Opaque to the core; relayed verbatim.
  // Failures surface via gRPC status, not a field here.
  bytes result = 1;
}

// --- bidirectional variant (ADR-008; also serves client-streaming) ---

message InvokeBidiStreamRequest {
  reserved 1; // context rides in the rat-callmeta-bin metadata header (ADR-007)
  // Set on the FIRST frame only to establish + authorize the call; MUST be empty
  // on subsequent frames (the core ignores it after open).
  string capability = 2;
  // One serialized axis request frame. Opaque to the core.
  bytes payload = 3;
}

message InvokeBidiStreamResponse {
  // One serialized axis response frame. Opaque to the core; relayed verbatim.
  bytes result = 1;
}
