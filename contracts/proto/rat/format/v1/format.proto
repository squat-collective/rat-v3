// Format axis service contract. Status: v1 (frozen — rat/1, ADR-009).
//
// A `kind: format` plugin (Iceberg, Delta, Hudi, …) implements table-format
// semantics: resolving refs to physical files, writing data, doing maintenance.
//
// Capability mapping (machine-readable via (rat.common.v1.capability) on each
// method — freeze-blocker #5 / reviews/06 I-3+I-4):
//   rat://format/v1/scan      -> Resolve
//   rat://format/v1/append    -> Append
//   rat://format/v1/merge     -> Merge
//   rat://format/v1/overwrite -> Overwrite
//   rat://format/v1/maintain  -> Maintain
//
// WHY Append/Merge/Overwrite are SEPARATE RPCs (reviews/06 I-3 / AUTH-8): the
// earlier draft had one `Write` RPC keyed by a `WriteMode` enum, so a plugin that
// `provides` only `append` could not be enforced at the method level — the C5
// gateway would have to inspect the payload's mode field to deny a MERGE
// (payload-level authz). Splitting per mode makes each capability a distinct
// method, so capability-enforcement is method-level and the manifest `provides`
// set maps 1:1 to callable methods. It also gives WRITE_MODE_OVERWRITE the
// capability URI it previously lacked (it was unreachable).
//
// C6: each capability above has a golden-data conformance vector. A plugin that
// lists `merge` in its manifest but fails the merge vector is NOT a valid format
// plugin. "Capability declared" is meaningless without "capability conformed" —
// that is what stops capability negotiation from being a lie (reviews/02 Stage5).
syntax = "proto3";

package rat.format.v1;

import "rat/common/v1/annotations.proto";
import "rat/common/v1/data.proto";

option go_package = "github.com/squat-collective/rat-v3/contracts/sdks/go/rat/format/v1;formatv1";

service FormatService {
  // Resolve a table ref to a readable Arrow stream descriptor. Bulk bytes flow
  // out-of-band via the returned ArrowStream.
  rpc Resolve(ResolveRequest) returns (ResolveResponse) {
    option (rat.common.v1.capability) = "rat://format/v1/scan";
  }

  // Append rows (no key matching). Caller hands an ArrowStream to pull from.
  rpc Append(AppendRequest) returns (AppendResponse) {
    option (rat.common.v1.capability) = "rat://format/v1/append";
  }

  // Merge (upsert) rows matched on `merge_keys`.
  rpc Merge(MergeRequest) returns (MergeResponse) {
    option (rat.common.v1.capability) = "rat://format/v1/merge";
  }

  // Overwrite the target (replace existing data).
  rpc Overwrite(OverwriteRequest) returns (OverwriteResponse) {
    option (rat.common.v1.capability) = "rat://format/v1/overwrite";
  }

  // Format upkeep (compaction, snapshot expiry, manifest rewrite). Idempotent;
  // safe to retry.
  rpc Maintain(MaintainRequest) returns (MaintainResponse) {
    option (rat.common.v1.capability) = "rat://format/v1/maintain";
  }
}

message ResolveRequest {
  reserved 1; // RequestContext travels in the rat-callmeta-bin metadata header (ADR-007)
  rat.common.v1.TableRef table = 2;
  // Optional column projection + predicate pushdown hints (opaque to core).
  repeated string columns = 3;
  string predicate = 4;
}

message ResolveResponse {
  // Out-of-band Arrow endpoint to pull matching record batches from.
  rat.common.v1.ArrowStream stream = 1;
}

message AppendRequest {
  reserved 1; // RequestContext travels in the rat-callmeta-bin metadata header (ADR-007)
  rat.common.v1.TableRef table = 2;
  // Source Arrow stream the format pulls rows from.
  rat.common.v1.ArrowStream source = 3;
  // Stable id for THIS logical write (e.g. the run id). Makes the write idempotent
  // under an at-least-once retry (C1, ADR-012): a repeated key that already committed
  // is a no-op returning the original WriteResult with already_applied=true. Empty ==
  // not idempotent. The effect-leg twin of catalog MergeBranch/CommitTable idempotency.
  string idempotency_key = 4;
}

message AppendResponse {
  rat.common.v1.WriteResult result = 1;
}

message MergeRequest {
  reserved 1; // RequestContext travels in the rat-callmeta-bin metadata header (ADR-007)
  rat.common.v1.TableRef table = 2;
  rat.common.v1.ArrowStream source = 3;
  // The key columns to match existing rows on.
  repeated string merge_keys = 4;
  // Idempotent-write key — see AppendRequest.idempotency_key (C1, ADR-012). Empty ==
  // not idempotent.
  string idempotency_key = 5;
}

message MergeResponse {
  rat.common.v1.WriteResult result = 1;
}

message OverwriteRequest {
  reserved 1; // RequestContext travels in the rat-callmeta-bin metadata header (ADR-007)
  rat.common.v1.TableRef table = 2;
  rat.common.v1.ArrowStream source = 3;
  // Idempotent-write key — see AppendRequest.idempotency_key (C1, ADR-012). Empty ==
  // not idempotent.
  string idempotency_key = 4;
}

message OverwriteResponse {
  rat.common.v1.WriteResult result = 1;
}

message MaintainRequest {
  reserved 1; // RequestContext travels in the rat-callmeta-bin metadata header (ADR-007)
  rat.common.v1.TableRef table = 2;
}

message MaintainResponse {
  rat.common.v1.WriteResult result = 1;
}
