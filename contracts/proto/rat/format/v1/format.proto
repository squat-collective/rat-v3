// Format axis service contract. DRAFT — sub-phase 0b.
//
// A `kind: format` plugin (Iceberg, Delta, Hudi, …) implements table-format
// semantics: resolving refs to physical files, writing data, doing maintenance.
//
// Capability mapping (the manifest `provides` URIs resolve to these RPCs):
//   rat://format/v1/scan     -> Resolve (read path: ref -> stream)
//   rat://format/v1/merge    -> Write with mode=MERGE
//   rat://format/v1/append   -> Write with mode=APPEND
//   rat://format/v1/maintain -> Maintain (compaction, expiry)
//
// C6: each capability above has a golden-data conformance vector. A plugin that
// lists `merge` in its manifest but fails the merge vector is NOT a valid format
// plugin. "Capability declared" is meaningless without "capability conformed" —
// that is what stops capability negotiation from being a lie (reviews/02 Stage5).
syntax = "proto3";

package rat.format.v1;

import "rat/common/v1/context.proto";
import "rat/common/v1/data.proto";

option go_package = "github.com/rat-dev/rat/gen/rat/format/v1;formatv1";

service FormatService {
  // rat://format/v1/scan — resolve a table ref to a readable Arrow
  // stream descriptor. Bulk bytes flow out-of-band via the returned ArrowStream.
  rpc Resolve(ResolveRequest) returns (ResolveResponse);

  // rat://format/v1/{merge,append} — write data into the table. The
  // caller hands an ArrowStream to pull from; the format does the rest.
  rpc Write(WriteRequest) returns (WriteResponse);

  // rat://format/v1/maintain — format upkeep (compaction, snapshot
  // expiry, manifest rewrite). Idempotent; safe to retry.
  rpc Maintain(MaintainRequest) returns (MaintainResponse);
}

enum WriteMode {
  WRITE_MODE_UNSPECIFIED = 0;
  WRITE_MODE_APPEND = 1;
  WRITE_MODE_MERGE = 2;
  WRITE_MODE_OVERWRITE = 3;
}

message ResolveRequest {
  rat.common.v1.RequestContext context = 1;
  rat.common.v1.TableRef table = 2;
  // Optional column projection + predicate pushdown hints (opaque to core).
  repeated string columns = 3;
  string predicate = 4;
}

message ResolveResponse {
  // Out-of-band Arrow endpoint to pull matching record batches from.
  rat.common.v1.ArrowStream stream = 1;
}

message WriteRequest {
  rat.common.v1.RequestContext context = 1;
  rat.common.v1.TableRef table = 2;
  WriteMode mode = 3;
  // Source Arrow stream the format pulls rows from.
  rat.common.v1.ArrowStream source = 4;
  // For MERGE: the key columns to match on.
  repeated string merge_keys = 5;
}

message WriteResponse {
  rat.common.v1.WriteResult result = 1;
}

message MaintainRequest {
  rat.common.v1.RequestContext context = 1;
  rat.common.v1.TableRef table = 2;
}

message MaintainResponse {
  rat.common.v1.WriteResult result = 1;
}
