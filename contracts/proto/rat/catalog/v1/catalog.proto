// Catalog axis service contract. Status: v1 (frozen — rat/1, ADR-009;
// RegisterTable + CommitTable added additively at rat/1.5, ADR-010).
//
// A `kind: catalog` plugin (Nessie, Unity, Lakekeeper, Glue, Polaris) owns
// table metadata + branch/version semantics. It is what makes "branch-isolated
// pipeline runs" (the v2 pipeline model we keep — overview.md) possible.
//
// Capability mapping:
//   rat://catalog/v1/get-table     -> GetTable
//   rat://catalog/v1/create-branch -> CreateBranch
//   rat://catalog/v1/merge-branch  -> MergeBranch
//   rat://catalog/v1/register-table-> RegisterTable  (ADR-010, additive)
//   rat://catalog/v1/commit-table  -> CommitTable    (ADR-010, additive)
//
// Not every catalog supports branching (Glue doesn't); those plugins simply do
// not `provide` the branch capabilities, and the registry won't wire a
// branch-requiring strategy to them. Capability negotiation, not feature flags.
//
// MERGE SAFETY (reviews/06 #8 = ARCH-4 / I-18): MergeBranch is the publish gate
// of the pipeline model and the reconciler RETRIES it, so it must be safe under
// retry AND concurrency. Two fields make it so:
//   - `expected_into_snapshot` — optimistic concurrency on the target. The merge
//     applies only if `into_branch` is still at this snapshot; otherwise it fails
//     (the caller re-reads + re-tests). Without it, two concurrent merges into
//     main silently lose one side's updates (lost-update).
//   - `idempotency_key` — a stable id for THIS logical merge (e.g. the run id).
//     A retry with the same key that already committed is a no-op that returns
//     the original result (MergeBranchResponse.already_applied = true), so a
//     reconciler retry can't double-apply.
// NOTE: this is the branch-MERGE linkage. The separate gap — how the catalog
// learns what format.Write put on a branch — is closed by the additive
// commit-linkage RPCs below (RegisterTable + CommitTable), added at rat/1.5 per
// ADR-010 (resolving ADR-009 residual R3 / reviews/08 B1). They are additive: the
// frozen GetTable/CreateBranch/MergeBranch shapes are unchanged.
syntax = "proto3";

package rat.catalog.v1;

import "rat/common/v1/annotations.proto";
import "rat/common/v1/data.proto";

option go_package = "github.com/le-squat/rat/gen/rat/catalog/v1;catalogv1";

service CatalogService {
  // rat://catalog/v1/get-table — resolve a table identifier to a TableRef
  // (physical location + current snapshot/branch).
  rpc GetTable(GetTableRequest) returns (GetTableResponse) {
    option (rat.common.v1.capability) = "rat://catalog/v1/get-table";
  }

  // rat://catalog/v1/create-branch — open an isolated branch for a pipeline run.
  rpc CreateBranch(CreateBranchRequest) returns (CreateBranchResponse) {
    option (rat.common.v1.capability) = "rat://catalog/v1/create-branch";
  }

  // rat://catalog/v1/merge-branch — merge a completed run's branch back to main,
  // after quality tests pass (the pre-merge gate of the v2 pipeline model).
  rpc MergeBranch(MergeBranchRequest) returns (MergeBranchResponse) {
    option (rat.common.v1.capability) = "rat://catalog/v1/merge-branch";
  }

  // rat://catalog/v1/register-table — register a NEW table so a pipeline can
  // create its own output (not only read pre-existing tables). Idempotent:
  // re-registering an existing identifier returns the existing ref (reconcile-safe,
  // no ALREADY_EXISTS). The "register" half of the create→write→register→merge loop
  // (ADR-010 / reviews/08 B1). Distinct capability from commit-table so creating a
  // new catalog entry is a separately-grantable privilege (C5 method-level authz).
  rpc RegisterTable(RegisterTableRequest) returns (RegisterTableResponse) {
    option (rat.common.v1.capability) = "rat://catalog/v1/register-table";
  }

  // rat://catalog/v1/commit-table — record the snapshot a format.Write produced
  // for a table on a branch (the value returned in WriteResult.snapshot_id). This
  // is the commit-LINKAGE: the catalog learns exactly what landed. Safe under
  // retry + concurrency via the SAME model as MergeBranch — `expected_snapshot`
  // optimistic-concurrency guard + `idempotency_key` (the write-leg idempotency the
  // reviews/08 B1 architect→sre cross-consult flagged). ADR-010.
  rpc CommitTable(CommitTableRequest) returns (CommitTableResponse) {
    option (rat.common.v1.capability) = "rat://catalog/v1/commit-table";
  }
}

message GetTableRequest {
  reserved 1; // RequestContext travels in the rat-callmeta-bin metadata header (ADR-007)
  string identifier = 2;
  // Optional branch to read from (empty == main).
  string branch = 3;
}

message GetTableResponse {
  // NO `found` field BY DESIGN (error-model M2, common/v1/ERROR_MODEL.md): a
  // GetTable on a named table the caller asserts exists is not normal control flow
  // and is not enumeration-sensitive, so an unknown identifier is an ERROR —
  // `NOT_FOUND` status, not a `found=false` outcome. (Contrast state.Get /
  // secret.Resolve, which DO use a `found` bool — read-miss is normal there, and
  // secret additionally collapses forbidden into absent for anti-enumeration.)
  rat.common.v1.TableRef table = 1;
}

message CreateBranchRequest {
  reserved 1; // RequestContext travels in the rat-callmeta-bin metadata header (ADR-007)
  // Branch name to create (e.g. a run id).
  string branch = 2;
  // Branch point (empty == tip of main).
  string from_branch = 3;
}

message CreateBranchResponse {
  string branch = 1;
}

message MergeBranchRequest {
  reserved 1; // RequestContext travels in the rat-callmeta-bin metadata header (ADR-007)
  string branch = 2;
  string into_branch = 3;
  // Optimistic-concurrency guard: the snapshot `into_branch` is expected to be at
  // for this merge to apply. Empty == unconditional (no concurrency guard — only
  // safe when the caller knows it's the sole writer). See MERGE SAFETY above.
  string expected_into_snapshot = 4;
  // Stable id for this logical merge (e.g. the pipeline run id). Makes MergeBranch
  // idempotent under reconciler retry: re-submitting a key that already committed
  // is a no-op returning the original result. Empty == not idempotent (each call
  // is a fresh merge attempt).
  string idempotency_key = 5;
}

message MergeBranchResponse {
  // Resulting snapshot id on the target branch.
  string snapshot_id = 1;
  // True if this response reflects a previously-committed merge with the same
  // idempotency_key (the retry was a no-op), rather than a merge applied now.
  bool already_applied = 2;
}

message RegisterTableRequest {
  reserved 1; // RequestContext travels in the rat-callmeta-bin metadata header (ADR-007)
  // Identifier of the table to register, e.g. "warehouse.sales.summary".
  string identifier = 2;
  // Optional storage/format URI hint for the new table (empty == the catalog
  // synthesizes one). Mirrors TableRef.uri.
  string uri = 3;
  // Optional branch the table is registered on (empty == main).
  string branch = 4;
}

message RegisterTableResponse {
  // The registered table. Re-registering an existing identifier is idempotent and
  // returns the existing ref (no ALREADY_EXISTS — registration is reconcile-safe).
  rat.common.v1.TableRef table = 1;
}

message CommitTableRequest {
  reserved 1; // RequestContext travels in the rat-callmeta-bin metadata header (ADR-007)
  // Table whose written snapshot is being recorded. MUST already be registered
  // (unknown table → NOT_FOUND).
  string identifier = 2;
  // Branch the commit lands on (empty == main).
  string branch = 3;
  // The snapshot id the write produced — the value the format returned in
  // WriteResult.snapshot_id. This is the commit-LINKAGE: the catalog records
  // exactly what format.Write landed. REQUIRED (empty == INVALID_ARGUMENT); an
  // unversioned format that cannot report a snapshot simply does not commit-link.
  string snapshot_id = 4;
  // Optimistic-concurrency guard: the snapshot the table is expected to be at on
  // `branch` for this commit to apply. Empty == unconditional (only safe when the
  // caller knows it's the sole writer). Mismatch → FAILED_PRECONDITION. The twin of
  // MergeBranch.expected_into_snapshot.
  string expected_snapshot = 5;
  // Stable id for THIS logical commit (e.g. the pipeline run id). Makes CommitTable
  // idempotent under at-least-once/reconciler retry: re-submitting a key that
  // already committed is a no-op returning the original result. Empty == not
  // idempotent. The twin of MergeBranch.idempotency_key — the write-leg idempotency
  // the reviews/08 B1 architect→sre cross-consult flagged as missing.
  string idempotency_key = 6;
}

message CommitTableResponse {
  // The snapshot now recorded for the table on the branch (the committed value).
  string snapshot_id = 1;
  // True if this response reflects a previously-committed CommitTable with the same
  // idempotency_key (the retry was a no-op), rather than a commit applied now.
  bool already_applied = 2;
}
