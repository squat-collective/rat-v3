// Secret-backend axis service contract. DRAFT — sub-phase 0b.
//
// A `kind: secret-backend` plugin (env, file, Vault, cloud KMS/secrets-manager)
// resolves secret references to secret values, on demand, never at rest in
// manifests or events.
//
// Capability mapping:
//   rat://secret/v1/resolve -> Resolve (ref -> value, short-lived)
//
// SECURITY (reviews/04 I13 — secret-handling contract): secrets NEVER appear in
// manifests, events, or logs — only opaque REFERENCES do (e.g. "ref://vault/db/pw").
// Plugins request the value here at point of use; values are returned with a TTL
// and MUST NOT be persisted. The `value` field is marked never-log by convention
// (the core's redaction obligation, reviews/04). Vended creds for STORAGE go
// through storage/v1 VendCredentials instead — this axis is for arbitrary
// app-level secrets (API keys, DB passwords).
syntax = "proto3";

package rat.secret.v1;

import "rat/common/v1/context.proto";

option go_package = "github.com/rat-dev/rat/gen/rat/secret/v1;secretv1";

service SecretService {
  // rat://secret/v1/resolve — resolve a secret reference to its value.
  rpc Resolve(ResolveRequest) returns (ResolveResponse);
}

message ResolveRequest {
  rat.common.v1.RequestContext context = 1;
  // Opaque secret reference, e.g. "ref://vault/prod/db-password". The plugin
  // MUST scope resolution by context.tenant (no cross-tenant secret reads).
  string secret_ref = 2;
}

message ResolveResponse {
  bool found = 1;
  // The secret value. NEVER logged, NEVER persisted by the caller. Redaction is
  // a core obligation (reviews/04 I13).
  bytes value = 2;
  // Value validity (unix epoch millis); 0 == no expiry hint. Callers re-resolve
  // rather than cache past this.
  int64 expires_unix_ms = 3;
}
