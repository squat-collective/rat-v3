# Rust SDK codegen (ADR-006 D1/D3). Generated into sdks/rust/, committed,
# regenerated via scripts/gen-sdks.sh — never hand-edited.
# prost (messages) + tonic (gRPC services), via the community remote plugins.
version: v2
plugins:
  - remote: buf.build/community/neoeinstein-prost
    out: sdks/rust
  - remote: buf.build/community/neoeinstein-tonic
    out: sdks/rust
