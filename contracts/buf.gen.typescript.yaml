# TypeScript SDK codegen (ADR-006 D1/D3; ADR-018 connectionless). LOCAL plugins — buf
# runs protoc-gen-es + protoc-gen-connect-es from PATH (no BSR call), pinned in
# contracts/codegen/Dockerfile.typescript. protobuf-es (messages) + connect-es (services).
version: v2
plugins:
  - local: protoc-gen-es
    out: sdks/typescript
    opt: target=ts
  - local: protoc-gen-connect-es
    out: sdks/typescript
    opt: target=ts
