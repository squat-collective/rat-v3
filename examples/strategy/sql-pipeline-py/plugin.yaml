# rat-sql-pipeline — a multi-model pipeline strategy (the data platform's "runner",
# decoupled into a capability). EXPLORATORY (ADR-020 S2). Additive; frozen strategy/v1
# surface unchanged. Provides strategy/apply; reaches engine + catalog only by capability
# through the gateway (so it requires those caps — C5 enforces the chain).
api_version: rat/1
kind: strategy
metadata:
  name: rat-sql-pipeline
  version: 0.1.0
compatible_core: ["rat/1"]
provides:
  - capability: rat://strategy/v1/apply
requires:
  - capability: rat://engine/v1/execute
  - capability: rat://catalog/v1/get-table
  - capability: rat://catalog/v1/register-table
  - capability: rat://catalog/v1/commit-table
