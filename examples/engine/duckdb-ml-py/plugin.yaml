# rat-engine-duckdb-ml-py — the data-dev plane engine (DuckDB + ML).
# EXPLORATORY (experiments/data-dev-plane). Additive: ML is an engine extension, not a
# new axis — this manifest provides only the frozen rat://engine/v1 capabilities; the
# embed()/vss/ducklake ML surface is SQL *inside* execute/query, invisible to the wire.
# Validates against contracts/schema/{plugin.v1.json, kinds/engine.v1.json}.
api_version: rat/1
kind: engine
metadata:
  name: rat-engine-duckdb-ml
  version: 0.1.0
  authors: ["RAT data-dev plane"]
  description: "DuckDB engine + ducklake/httpfs/vss + embed() UDF (compute + AI)"
  license: Apache-2.0
compatible_core: ["rat/1"]
provides:
  - capability: rat://engine/v1/execute
  - capability: rat://engine/v1/query
  - capability: rat://engine/v1/preview
requires:
  # The lake's data bytes live on object storage; the engine reads/writes them with
  # short-TTL creds vended by a storage plugin (minio-s3). Capability, not a name.
  - capability: rat://storage/v1/vend-credentials
resources:
  requests:
    cpu: "1"
    memory: "1Gi"
  limits:
    cpu: "4"
    memory: "4Gi"
