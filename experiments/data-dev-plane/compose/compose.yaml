# Data-dev plane — remote stack (MinIO S3 + Postgres DuckLake metadata).
#
# A declarative convenience for `podman compose` / `docker compose` users. The
# canonical, dependency-free path is `make data-dev-remote` (scripts/data-dev-remote.sh,
# plain podman run — no compose needed). Both boot the same two services; the pipeline
# (experiments/data-dev-plane/run-remote.py) reaches them by service name on the network.
#
# EXPLORATORY (experiments/data-dev-plane). Ephemeral by design — no named volumes, so
# `down` is a clean slate. The minio-s3 storage plugin vends short-TTL, tenant-scoped
# STS creds from the root creds below; the engine reads/writes Parquet on S3 directly.
services:
  postgres:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_USER: ducklake
      POSTGRES_PASSWORD: ducklake
      POSTGRES_DB: ducklake
    # No host port by default; the runner joins this network and uses `postgres:5432`.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ducklake -d ducklake"]
      interval: 2s
      timeout: 3s
      retries: 15

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    # Uncomment to browse the console / reach the API from the host:
    # ports:
    #   - "9100:9000"   # S3 API
    #   - "9101:9001"   # console
