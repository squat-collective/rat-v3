# plugins.yaml — the launch-mode platform plane (ADR-022). rat LAUNCHES each plugin as
# its own container from these one-line entries; the infra (compose) carries no per-plugin
# service. Adding a plugin = adding an entry + its image.
#
# Run it (rat on the host, the proven podman runtime, launches the plugin containers):
#   make plugin-images
#   make rat-build
#   ( cd platform && set -a && . ./.env && set +a && /path/to/dist/rat serve --plane plugins.yaml )
#
# ${VAR} references interpolate from the environment at load (ADR-050) — the facts live
# once in ./.env. A missing var fails loud by name; `rat validate --plane plugins.yaml`
# checks it all pre-boot.
addr: 0.0.0.0:7777
runtime: podman
health_timeout: 90s
plugins:
  - name: rat-pipeline
    manifest: ./manifests/pipeline.plugin.yaml
    launch:
      image: rat/dbt-runner:dev      # the dbt-runner — runs `dbt build` on the APPLIED project
      isolation: i9
      env:
        # run the `rat apply`'d project (fetched from the state-backend each run); the baked
        # sample is the fallback until something is applied. RAT_GATEWAY/RAT_PLUGIN_NAME injected.
        RAT_PROJECT_KEY: "projects/medallion"
        # Q2: materialize the medallion into the SHARED DuckLake. The creds are REFS the
        # runner resolves from the secret plugin before running dbt (no creds in this file);
        # only non-secret config (data path, endpoint) is literal.
        RAT_LAKE_PG_REF: "ref://lake/pg-dsn"
        RAT_S3_KEY_REF: "ref://lake/s3-key"
        RAT_S3_SECRET_REF: "ref://lake/s3-secret"
        RAT_LAKE_DATA: "s3://rat/lake/"
        RAT_S3_ENDPOINT: "${PLATFORM_INFRA_HOST}:${PLATFORM_INFRA_S3_PORT}"

  - name: rat-secret
    manifest: ./manifests/secret.plugin.yaml
    launch:
      image: rat/secret:dev          # the secret-backend — holds the platform's secrets, one trust boundary
      isolation: i9
      env:
        # The platform's secrets live HERE only (tenant -> ref -> value). Consumers hold a ref,
        # never the value. The STRUCTURE stays visible here; the facts come from ./.env
        # (ADR-050). Production swaps this env store for a resolve-time backend like
        # plugins/secret/vault-py behind the same rat://secret/v1/resolve.
        RAT_SECRETS: '{"acme": {"ref://state/pg-dsn": "host=${PLATFORM_INFRA_HOST} port=${PLATFORM_INFRA_PG_PORT} dbname=${PLATFORM_PG_DB} user=${PLATFORM_PG_USER} password=${PLATFORM_PG_PASSWORD}", "ref://lake/pg-dsn": "dbname=${PLATFORM_PG_DB} host=${PLATFORM_INFRA_HOST} port=${PLATFORM_INFRA_PG_PORT} user=${PLATFORM_PG_USER} password=${PLATFORM_PG_PASSWORD}", "ref://lake/s3-key": "${PLATFORM_S3_USER}", "ref://lake/s3-secret": "${PLATFORM_S3_PASSWORD}"}}'

  - name: rat-state
    manifest: ./manifests/state.plugin.yaml
    launch:
      image: rat/state:dev           # run history, backed by Postgres (from the infra compose)
      isolation: i9
      env:
        # No credential here — just an opaque ref. rat-state resolves it via rat://secret/v1/resolve
        # (gateway-routed, C5-authorized, audited) at first use. RAT_GATEWAY is injected by rat.
        RAT_STATE_PG_REF: "ref://state/pg-dsn"

  - name: rat-scheduler
    manifest: ./manifests/scheduler.plugin.yaml
    launch:
      image: rat/scheduler:dev       # self-driving clock — fires the pipeline on a cron
      isolation: i9
      env:
        RAT_PLUGIN_NAME: "rat-scheduler"
        # RAT_GATEWAY is injected by rat per topology (host.containers.internal | <rat>:7777 | loopback)
        RAT_SCHEDULE_INTERVAL: "${PLATFORM_SCHEDULE_INTERVAL}"
        RAT_PIPELINE_TARGET: "${PLATFORM_PIPELINE_TARGET}"

  - name: platform-bff
    manifest: ./manifests/bff.plugin.yaml
    launch:
      image: rat/bff:dev             # the UI control-path backend (HTTP on the launched port)
      isolation: i9
      env:
        RAT_PLUGIN_NAME: "platform-bff"
        # RAT_GATEWAY injected by rat per topology (see rat-scheduler above)
        # the shared lake (read-only) for the bulk data leg — /api/tables, /api/table/<name> (Q2).
        # Creds are REFS the bff resolves from the secret plugin (no creds in this file).
        RAT_LAKE_PG_REF: "ref://lake/pg-dsn"
        RAT_S3_KEY_REF: "ref://lake/s3-key"
        RAT_S3_SECRET_REF: "ref://lake/s3-secret"
        RAT_LAKE_DATA: "s3://rat/lake/"
        RAT_S3_ENDPOINT: "${PLATFORM_INFRA_HOST}:${PLATFORM_INFRA_S3_PORT}"

  - name: platform-runner
    manifest: ./manifests/runner.plugin.yaml
    # register-only driver — the manual-trigger identity (requires strategy/apply + state).
