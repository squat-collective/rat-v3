# platform/compose.yaml — the always-on RAT data platform stack (ADR-020 S1).
#
#   docker compose up -d        # Postgres + MinIO + engine + catalog + rat serve (stays up)
#   docker compose run --rm runner   # run the medallion once through the gateway
#   docker compose down -v      # tear it all down
#
# rat serve (the orchestrator) runs in a container and ATTACHES to the engine + catalog
# sibling containers by service name — no docker-in-docker. The DuckLake's metadata lives
# on Postgres and its data on MinIO/S3, so the plugin containers share one lake over the
# network (the only way two containers can, given the frozen LaunchSpec has no volume mount).
name: rat-platform

services:
  # All credentials/knobs come from ./.env — the single fact sheet (ADR-050 / DX-5).
  postgres:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_USER: ${PLATFORM_PG_USER}
      POSTGRES_PASSWORD: ${PLATFORM_PG_PASSWORD}
      POSTGRES_DB: ${PLATFORM_PG_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PLATFORM_PG_USER} -d ${PLATFORM_PG_DB}"]
      interval: 3s
      timeout: 3s
      retries: 30

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${PLATFORM_S3_USER}
      MINIO_ROOT_PASSWORD: ${PLATFORM_S3_PASSWORD}
    # No host ports — the plugins + runner reach MinIO by service name on the network.

  # One-shot: create the lake bucket at stack-up (infra provisioning), so the pipeline
  # can write whether it's triggered by the scheduler or the manual runner.
  minio-setup:
    image: quay.io/minio/mc
    depends_on:
      minio: {condition: service_started}
    entrypoint:
      - sh
      - -lc
      - "until mc alias set m http://minio:9000 ${PLATFORM_S3_USER} ${PLATFORM_S3_PASSWORD}; do sleep 1; done; mc mb --ignore-existing m/rat; echo bucket-ready"
    restart: "no"

  # NOTE: the medallion's engine + catalog are EMBEDDED in the dbt-runner (dbt-duckdb +
  # DuckLake, in-process — see plugins/runner/dbt-duckdb). The standalone engine/catalog
  # plugins (duckdb-ml + ducklake) graduated to the `rat-data-dev` showcase repo and are not
  # needed here: nothing on the dbt path invokes rat://engine or rat://catalog.

  pipeline:
    image: docker.io/library/python:3.12
    working_dir: /work/plugins/runner/dbt-duckdb
    command:
      - bash
      - -lc
      - "pip install -q --root-user-action=ignore grpcio==1.80.0 protobuf==7.35.0 && python -m venv /opt/dbtvenv && /opt/dbtvenv/bin/pip install -q dbt-duckdb==1.9.4 duckdb==1.5.3 && exec python main.py"
    environment:
      PYTHONPATH: /work/contracts/sdks/python
      RAT_PLUGIN_ADDR: "0.0.0.0:50051"
      RAT_DBT_BIN: "/opt/dbtvenv/bin/dbt"      # dbt in its own venv (protobuf isolation)
      # the dbt project (the user's code) + the lake the runner materializes into.
      RAT_DBT_PROJECT: "/work/platform/dbt-project"
      RAT_DBT_PROFILES: "/work/platform/dbt-project"
      RAT_LANDING: "/work/platform/landing"
      RAT_DUCKLAKE_META: "postgres:host=postgres port=5432 dbname=${PLATFORM_PG_DB} user=${PLATFORM_PG_USER} password=${PLATFORM_PG_PASSWORD}"
      RAT_DUCKLAKE_DATA: "s3://rat/platform/"
      RAT_S3_ENDPOINT: "minio:9000"
      RAT_S3_KEY_ID: ${PLATFORM_S3_USER}
      RAT_S3_SECRET: ${PLATFORM_S3_PASSWORD}
    volumes:
      - ../:/work:z
      - pipcache:/root/.cache/pip
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; socket.create_connection(('localhost',50051),2)\""]
      interval: 5s
      timeout: 4s
      retries: 60
      start_period: 120s              # dbt-duckdb is a heavy pip install on first run
    # No depends_on rat-serve: it serves immediately; rat-serve depends_on IT (to attach).

  state:
    image: docker.io/library/python:3.12
    working_dir: /work/plugins/state/postgres-py
    command:
      - bash
      - -lc
      - "pip install -q --root-user-action=ignore grpcio==1.80.0 protobuf==7.35.0 psycopg2-binary==2.9.9 && exec python main.py"
    environment:
      PYTHONPATH: /work/contracts/sdks/python
      RAT_PLUGIN_ADDR: "0.0.0.0:50051"
      RAT_STATE_PG: "host=postgres port=5432 dbname=${PLATFORM_PG_DB} user=${PLATFORM_PG_USER} password=${PLATFORM_PG_PASSWORD}"
    volumes:
      - ../:/work:z
      - pipcache:/root/.cache/pip
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; socket.create_connection(('localhost',50051),2)\""]
      interval: 5s
      timeout: 4s
      retries: 40
      start_period: 30s
    depends_on:
      postgres: {condition: service_healthy}

  rat-serve:
    image: rat/serve:dev          # built by `make rat-image`
    # the image entrypoint is `rat serve --plane /etc/rat/plane.yaml`; we mount our plane over it
    ports:
      - "7777:7777"
    volumes:
      - ./plane.yaml:/etc/rat/plane.yaml:ro,z
      - ./manifests:/etc/rat/manifests:ro,z
    depends_on:
      pipeline: {condition: service_healthy}
      state: {condition: service_healthy}

  scheduler:
    image: docker.io/library/python:3.12
    working_dir: /work/plugins/scheduler/cron-py
    command:
      - bash
      - -lc
      - "pip install -q --root-user-action=ignore grpcio==1.80.0 protobuf==7.35.0 && exec python main.py"
    environment:
      PYTHONPATH: /work/contracts/sdks/python
      RAT_PLUGIN_NAME: "rat-scheduler"
      RAT_GATEWAY: ${PLATFORM_GATEWAY}
      RAT_SCHEDULE_INTERVAL: ${PLATFORM_SCHEDULE_INTERVAL}
      RAT_PIPELINE_TARGET: ${PLATFORM_PIPELINE_TARGET}
    volumes:
      - ../:/work:z
      - pipcache:/root/.cache/pip
    depends_on:
      rat-serve: {condition: service_started}

  bff:
    image: docker.io/library/python:3.12
    working_dir: /work/platform
    command:
      - bash
      - -lc
      - "pip install -q --root-user-action=ignore grpcio==1.80.0 protobuf==7.35.0 && exec python bff.py"
    environment:
      PYTHONPATH: /work/contracts/sdks/python
      RAT_PLUGIN_NAME: "platform-bff"
      RAT_GATEWAY: ${PLATFORM_GATEWAY}  # the UI's control calls go through the REAL gateway
      RAT_PIPELINE_TARGET: ${PLATFORM_PIPELINE_TARGET}
      BFF_ADDR: "0.0.0.0:8080"
    ports:
      - "8088:8080"                     # the VS Code / web UI talks JSON here (host :8088)
    volumes:
      - ../:/work:z
      - pipcache:/root/.cache/pip
    depends_on:
      rat-serve: {condition: service_started}

  runner:
    image: docker.io/library/python:3.12
    profiles: ["run"]             # not started by `up`; run with `docker compose run --rm runner`
    working_dir: /work/platform
    command:
      - bash
      - -lc
      - "pip install -q --root-user-action=ignore grpcio==1.80.0 protobuf==7.35.0 duckdb==1.5.3 pyarrow==24.0.0 numpy==2.2.6 boto3==1.40.0 pyyaml && exec python run.py"
    environment:
      PYTHONPATH: /work/contracts/sdks/python
      RAT_GATEWAY: ${PLATFORM_GATEWAY}
      RAT_PLATFORM_LANDING: "/work/platform/landing"
      RAT_DUCKLAKE_META: "postgres:host=postgres port=5432 dbname=${PLATFORM_PG_DB} user=${PLATFORM_PG_USER} password=${PLATFORM_PG_PASSWORD}"
      RAT_DUCKLAKE_DATA: "s3://rat/platform/"
      RAT_DUCKLAKE_ALIAS: "lake"
      RAT_S3_ENDPOINT: "minio:9000"
      RAT_S3_KEY_ID: ${PLATFORM_S3_USER}
      RAT_S3_SECRET: ${PLATFORM_S3_PASSWORD}
      RAT_S3_USE_SSL: "false"
    volumes:
      - ../:/work:z
      - pipcache:/root/.cache/pip
    depends_on:
      rat-serve: {condition: service_started}

volumes:
  pipcache:
