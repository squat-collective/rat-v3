# Platform settings — read by the runner (run.py) + tooling, NOT by `rat serve`
# (the daemon reads plane.yaml). Separates "what the platform is" from "what the
# orchestrator runs". See ADR-020.
gateway: 127.0.0.1:7777          # where rat serve listens (matches plane.yaml addr)
caller: platform-runner          # the identity the runner issues commands as (C5 authorizes from its manifest)
project: ./project               # the medallion models live here
pipeline: ./pipelines/medallion.yaml
lake:                            # the shared DuckLake — used for co-located verification reads (M1)
  meta: sqlite:/data/lake/meta.db
  data: /data/lake/data/
  alias: lake
