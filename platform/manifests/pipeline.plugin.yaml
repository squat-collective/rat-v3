# rat-pipeline — the medallion pipeline as a capability (the v2 "runner" decoupled).
# Provides strategy/apply; reaches engine + catalog only by capability through the
# gateway (so it requires those — C5 enforces the whole chain).
api_version: rat/1
kind: strategy
metadata:
  name: rat-pipeline
  version: 0.1.0
compatible_core: ["rat/1"]
provides:
  - capability: rat://strategy/v1/apply
requires:
  # fetches the `rat apply`'d dbt project from the state-backend on each run (ADR-021).
  - capability: rat://state/v1/get
  # resolves the lake creds (RAT_LAKE_PG_REF, RAT_S3_*_REF) before running dbt (Q2 + secret).
  - capability: rat://secret/v1/resolve
  # publishes this plugin's UI contributions to the state-backend (ADR-024, contribute_ui).
  - capability: rat://state/v1/put
contributes:
  slots:
    - { target: rat://ui/v1/explorer, component: lake-tables }   # a Lake Tables view
    - { target: rat://ui/v1/command, component: run-pipeline }   # a Run-pipeline command
# dbt-duckdb + DuckLake are the engine + catalog, in-process. (Dep-composition — vend lake
# creds via storage — is next.)
