# rat-scheduler — the platform's self-driving clock. A register-only driver: it fires
# rat://strategy/v1/apply on an interval, so the gateway authorizes those fires from
# this `requires` set (C5). It serves no capability (the gateway never dials it).
api_version: rat/1
kind: scheduler-backend
metadata:
  name: rat-scheduler
  version: 0.1.0
compatible_core: ["rat/1"]
requires:
  - capability: rat://strategy/v1/apply
  - capability: rat://state/v1/put       # records a run record per fire
