# platform-runner — a register-only driver / operator identity. run.py and `ratctl --as
# platform-runner` connect as this identity; the gateway authorizes their commands against
# this `requires` set (C5).
api_version: rat/1
kind: strategy
metadata:
  name: platform-runner
  version: 0.1.0
compatible_core: ["rat/1"]
requires:
  - capability: rat://strategy/v1/apply
  - capability: rat://state/v1/list      # read the run history
  - capability: rat://state/v1/get
  - capability: rat://state/v1/put       # `rat apply` ships the project into state (ADR-021)
