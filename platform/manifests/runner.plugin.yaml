# platform-runner — a register-only driver. run.py connects as this identity; the
# gateway authorizes the medallion's commands against this `requires` set (C5).
api_version: rat/1
kind: strategy
metadata:
  name: platform-runner
  version: 0.1.0
compatible_core: ["rat/1"]
requires:
  - capability: rat://strategy/v1/apply
