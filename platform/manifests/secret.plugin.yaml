# rat-secret — the platform's secret-backend (env-backed). Holds the platform's secrets in
# one trust boundary and resolves them tenant-scoped on demand. Provides the frozen
# secret/v1 Resolve; consumers (e.g. rat-state) hold only an opaque ref, never the value.
api_version: rat/1
kind: secret-backend
metadata:
  name: rat-secret
  version: 0.1.0
compatible_core: ["rat/1"]
provides:
  - capability: rat://secret/v1/resolve
