# rat-secret-vault — a HashiCorp-Vault-backed secret-backend (the PRODUCTION shape of
# the secret axis, backlog DX-6). Provides the frozen secret/v1 Resolve. Every Resolve
# fetches from Vault AT CALL TIME — rotate the secret in Vault and the next resolve sees
# it, no plugin/daemon restart (the property the demo env-py store cannot give).
api_version: rat/1
kind: secret-backend
metadata:
  name: rat-secret-vault
  version: 0.1.0
  labels: { backend: vault, rotation: live }
compatible_core: ["rat/1"]
provides:
  - capability: rat://secret/v1/resolve
requires: []
resources:
  requests: { cpu: "50m", memory: "64Mi" }
  limits: { cpu: "250m", memory: "128Mi" }
