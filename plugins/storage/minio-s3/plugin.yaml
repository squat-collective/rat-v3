# rat-storage-minio-s3 — the data-dev plane storage (remote S3/MinIO).
# EXPLORATORY (experiments/data-dev-plane). Additive; the frozen storage/v1 surface is
# unchanged. The FIRST reference to implement the Q02 5c read/write vend split.
# Validates against contracts/schema/{plugin.v1.json, kinds/storage.v1.json}.
api_version: rat/1
kind: storage
metadata:
  name: rat-storage-minio
  version: 0.1.0
  authors: ["RAT data-dev plane"]
  description: "S3/MinIO remote storage; vends scoped, short-TTL STS creds"
  license: Apache-2.0
compatible_core: ["rat/1"]
provides:
  - capability: rat://storage/v1/vend-credentials
  - capability: rat://storage/v1/vend-credentials-read    # Q02 5c
  - capability: rat://storage/v1/vend-credentials-write   # Q02 5c
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
